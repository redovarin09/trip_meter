name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build Debug APK
        timeout-minutes: 15
        run: flutter build apk --debug

      - name: Dump Merged AndroidManifest
        run: |
          echo "=== Semua AndroidManifest.xml di build/ ==="
          find build -iname "AndroidManifest.xml" 2>/dev/null || true
          echo "=== Isi merged manifest (debug variant) ==="
          MANIFEST=$(find build/app/intermediates/merged_manifest -iname "AndroidManifest.xml" -path "*debug*" 2>/dev/null | head -n 1)
          if [ -z "$MANIFEST" ]; then
            MANIFEST=$(find build/app/intermediates/packaged_manifests -iname "AndroidManifest.xml" -path "*debug*" 2>/dev/null | head -n 1)
          fi
          if [ -z "$MANIFEST" ]; then
            MANIFEST=$(find build/app -iname "AndroidManifest.xml" -path "*debug*" 2>/dev/null | head -n 1)
          fi
          if [ -n "$MANIFEST" ]; then
            echo "File ditemukan: $MANIFEST"
            cat "$MANIFEST"
          else
            echo "TIDAK DITEMUKAN manifest hasil merge sama sekali."
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trip-meter-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
