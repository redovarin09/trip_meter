name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode Keystore & Generate key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
          echo "Keystore & key.properties berhasil dibuat dari GitHub Secrets."

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build Debug APK
        timeout-minutes: 15
        run: flutter build apk --debug

      - name: Build Release APK
        timeout-minutes: 15
        run: flutter build apk --release

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trip-meter-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Dump Merged AndroidManifest
        run: |
          echo "=== Semua AndroidManifest.xml di build/ ==="
          find build -iname "AndroidManifest.xml" 2>/dev/null || true
          echo "=== Isi merged manifest (debug variant) ==="
          MANIFEST=$(find build/app/intermediates/merged_manifest -iname "AndroidManifest.xml" -path "*debug*" 2>/dev/null | head -n 1)
          if [ -z "$MANIFEST" ]; then
            MANIFEST=$(find build/app/intermediates/packaged_manifests -iname "AndroidManifest.xml" -path "*debug*" 2>/dev/null | head -n 1)
          fi
          if [ -z "$MANIFEST" ]; then
            MANIFEST=$(find build/app -iname "AndroidManifest.xml" -path "*debug*" 2>/dev/null | head -n 1)
          fi
          if [ -n "$MANIFEST" ]; then
            echo "File ditemukan: $MANIFEST"
            cat "$MANIFEST"
          else
            echo "TIDAK DITEMUKAN manifest hasil merge sama sekali."
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trip-meter-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
